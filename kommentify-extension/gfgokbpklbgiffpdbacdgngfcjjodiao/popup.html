<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Replya - LinkedIn AI Assistant</title>
  <style>
    :root {
      --primary: #5170ff;
      --primary-dark: #0f4f99;
      --primary-light: rgba(20, 100, 192, 0.08);
      --text-main: #1f2937;
      --text-secondary: #6b7280;
      --bg-body: #f9fafb;
      --bg-card: #ffffff;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 9999px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-width: 320px;
      max-width: 400px;
      width: 100%;
      margin: 0 auto;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-body);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }

    .container {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Header - Animated Gradient */
    .header {
      background: linear-gradient(135deg, #5170ff, #0f4d93, #1874d9, #5170ff);
      background-size: 300% 300%;
      animation: gradientFlow 8s ease infinite;
      padding: 20px;
      color: white;
      border-bottom-left-radius: 24px;
      border-bottom-right-radius: 24px;
      box-shadow: 0 8px 32px rgba(20, 100, 192, 0.3);
      position: relative;
      z-index: 10;
    }

    @keyframes gradientFlow {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    /* User Info Card - Glassmorphism */
    .user-info {
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 12px;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255, 255, 255, 0.3);
      display: none;
      animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .user-info.visible {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .user-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-full);
      border: 2px solid rgba(255, 255, 255, 0.8);
      background: white;
      object-fit: cover;
    }

    .user-details {
      flex: 1;
      min-width: 0;
    }

    .user-name {
      font-size: 14px;
      font-weight: 600;
      color: white;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-email {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.9);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-stats {
      background: rgba(0, 0, 0, 0.1);
      border-radius: var(--radius-md);
      padding: 6px 10px;
      text-align: center;
      min-width: 60px;
    }

    .user-stats-number {
      font-size: 16px;
      font-weight: 700;
      color: white;
      line-height: 1.1;
    }

    .user-stats-label {
      font-size: 9px;
      color: rgba(255, 255, 255, 0.8);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* Content Area */
    .content {
      padding: 24px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .auth-section.hidden {
      display: none;
    }

    /* Login Card */
    .login-prompt {
      background: var(--bg-card);
      padding: 24px;
      border-radius: var(--radius-lg);
      text-align: center;
      box-shadow: var(--shadow-sm);
      border: 1px solid #e5e7eb;
    }

    .login-prompt-text {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }

    .btn-primary {
      background: linear-gradient(135deg, #5170ff 0%, #0f4d93 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(20, 100, 192, 0.35);
      position: relative;
      overflow: hidden;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }

    .btn-primary:hover::before {
      left: 100%;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #1874d9 0%, #5170ff 100%);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(20, 100, 192, 0.45);
    }

    .btn-primary:active {
      transform: translateY(0);
      box-shadow: 0 2px 10px rgba(20, 100, 192, 0.3);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: white;
      color: var(--text-main);
      border: 1px solid #e5e7eb;
      box-shadow: var(--shadow-sm);
    }

    .btn-secondary:hover {
      background: #f9fafb;
      border-color: #d1d5db;
      transform: translateY(-1px);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      padding: 6px 12px;
      font-size: 12px;
      margin-top: 12px;
      width: auto;
      margin-left: auto;
      margin-right: auto;
    }

    .btn-outline:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.6);
    }

    /* Action Grid */
    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .action-card {
      background: var(--bg-card);
      padding: 16px;
      border-radius: var(--radius-lg);
      border: 1px solid #e5e7eb;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      box-shadow: var(--shadow-sm);
      position: relative;
      overflow: hidden;
    }

    .action-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(20, 100, 192, 0.08), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .action-card:hover::before {
      opacity: 1;
    }

    .action-card:hover {
      border-color: var(--primary);
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 12px 30px rgba(20, 100, 192, 0.2);
    }

    .action-card:active {
      transform: translateY(-1px) scale(1);
    }

    .action-icon {
      font-size: 24px;
      margin-bottom: 4px;
    }

    .action-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 16px;
      margin-top: auto;
      border-top: 1px solid #e5e7eb;
      background: var(--bg-card);
    }

    .version {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .promo-link {
      display: block;
      font-size: 12px;
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      padding: 8px;
      border-radius: var(--radius-md);
      background: var(--primary-light);
      transition: background 0.2s;
    }

    .promo-link:hover {
      background: rgba(20, 100, 192, 0.12);
    }

    /* Action Grid */
    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .action-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 12px;
      background: var(--bg-card);
      border: 1px solid #e5e7eb;
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-sm);
    }

    .action-card:hover {
      border-color: var(--primary);
      background: var(--primary-light);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .action-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: var(--radius-md);
      background: var(--primary-light);
      color: var(--primary);
    }

    .action-card:hover .action-icon {
      background: rgba(20, 100, 192, 0.15);
    }

    .action-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
    }

    /* Utilities */
    .hidden {
      display: none !important;
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="header-top">
        <div style="display: flex; align-items: center; gap: 12px;">
          <img src="icons/icon128.png" alt="Replya Logo" width="48" height="48" style="border-radius: 50%; border: 3px solid white;">
          <h1>Replya</h1>
        </div>
      </div>

      <!-- User info (shown when logged in) -->
      <div class="user-info" id="userInfo">
        <div class="user-left">
          <img class="user-avatar" id="userAvatar" src="" alt="User">
          <div class="user-details">
            <div class="user-name" id="userName">Loading...</div>
            <div class="user-email" id="userEmail"></div>
          </div>
        </div>
        <div class="user-stats">
          <div class="user-stats-number" id="requestCount">0</div>
          <div class="user-stats-label">Requests</div>
        </div>
      </div>

      <!-- Logout button -->
      <button class="btn btn-outline hidden" id="logoutBtn">Sign Out</button>
    </div>

    <div class="content">
      <!-- Login section (shown when not logged in) -->
      <div class="auth-section" id="loginSection">
        <div class="login-prompt">
          <div class="login-prompt-text">
            Sign in with Google to start using AI-powered comment suggestions!
          </div>
          <button class="btn btn-primary" id="loginBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <span>Sign in with Google</span>
          </button>
        </div>
      </div>

      <!-- Main content (shown when logged in) -->
      <div class="auth-section hidden" id="mainContent">
        <div class="action-grid">
          <button class="action-card" id="guideBtn">
            <span class="action-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
              </svg>
            </span>
            <span class="action-label">Guide</span>
          </button>

          <button class="action-card" id="settingsBtn">
            <span class="action-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
              </svg>
            </span>
            <span class="action-label">Settings</span>
          </button>
        </div>

        <button class="btn btn-primary" style="margin-top: 8px;" id="openLinkedIn">
          <span>Open LinkedIn</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
            <polyline points="15 3 21 3 21 9"></polyline>
            <line x1="10" y1="14" x2="21" y2="3"></line>
          </svg>
        </button>

        <button class="btn btn-primary" style="margin-top: 8px;" id="havingIssuesBtn">
          <span>Having Issues?</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="footer">
      <a href="https://prepaired.app" target="_blank" class="promo-link" style="display: flex; align-items: center; justify-content: center; gap: 6px; background: linear-gradient(135deg, rgba(20, 100, 192, 0.08), rgba(15, 77, 147, 0.12)); border: 1px solid rgba(20, 100, 192, 0.15); font-weight: 600;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0;">
          <path d="M6 12L3.269 3.126A59.768 59.768 0 0 1 21.485 12 59.77 59.77 0 0 1 3.27 20.876L5.999 12zm0 0h7.5"></path>
        </svg>
        Ace your interviews with PrePaired AI
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0; opacity: 0.6;">
          <path d="M7 17L17 7"></path>
          <path d="M7 7h10v10"></path>
        </svg>
      </a>
      <div class="version">v2.0.2</div>
    </div>
  </div>

  <!-- Load Supabase JS (local bundle) -->
  <script src="supabase.js"></script>

  <!-- Load config and auth -->
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <!-- Load popup logic -->
  <script src="popup.js"></script>
</body>

</html>
